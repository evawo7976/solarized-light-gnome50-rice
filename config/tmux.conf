# ── Solarized Light tmux Configuration ──
# Light pastel backgrounds with dark accent text

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Status Bar ──
set -g status-style "bg=#eee8d5,fg=#657b83"
set -g status-position bottom
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 40

# Status left: session name in light teal segment
set -g status-left "#[fg=#2aa198,bg=#d1eae7,bold]  #S #[fg=#d1eae7,bg=#eee8d5,nobold]"

# Status right: time and date in light blue segment
set -g status-right "#[fg=#d3e8f0,bg=#eee8d5]#[fg=#268bd2,bg=#d3e8f0,bold] %H:%M  %d-%b "

# Window status
set -g window-status-format " #[fg=#93a1a1]#I:#W "
set -g window-status-current-format "#[fg=#ece0b8,bg=#eee8d5]#[fg=#b58900,bg=#ece0b8,bold] #I:#W #[fg=#ece0b8,bg=#eee8d5]"
set -g window-status-separator ""

# ── Pane Borders ──
set -g pane-border-style "fg=#eee8d5"
set -g pane-active-border-style "fg=#2aa198"

# ── Messages ──
set -g message-style "bg=#d1eae7,fg=#2aa198"
set -g message-command-style "bg=#d1eae7,fg=#2aa198"

# ── Clock ──
set -g clock-mode-colour "#268bd2"

# ── Copy Mode ──
set -g mode-style "bg=#d3e8f0,fg=#268bd2"

# ── Quality of Life ──
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000

# ── Keybindings ──
# Prefix: Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
